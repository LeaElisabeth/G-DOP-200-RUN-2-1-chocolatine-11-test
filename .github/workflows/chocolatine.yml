name: workflow

on:
  push:
  pull_request:
env:
    EXECUTABLES: "my_world"
    MIRROR_SSH_URL: "git@github.com:EpitechPGE1-2025/G-DOP-200-RUN-2-1-chocolatine-11.git"

jobs:
  check_compilation_and_coding_style:
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Coding style check
      run: banana-check-repo

    - name: List files
      run: ls -la

    - name: Compile project
      run: CC=epiclang make
      timeout-minutes: 2

    - name: Clean project
      run: make clean

    - name: Check executable
      run: |
        for file in $(echo "$EXECUTABLES" | tr ',' ' ' ); do
          if [ ! -x "$file" ]; then
            exit 1
          fi
        done

  run_tests:
    needs: check_compilation_and_coding_style
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Run tests
      run: make tests_run
      timeout-minutes: 2

  push_to_mirror:
    needs: run_tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Push to mirror
      uses: pixta-dev/repository-mirroring-action@v1
      with:
        ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
        target_repo_url: ${{ env.MIRROR_SSH_URL }}