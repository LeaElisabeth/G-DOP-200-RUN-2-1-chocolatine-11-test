name: workflow

on:
  push:
  pull_request:
env:
    EXECUTABLES: "my_world"

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Coding style check
      run: banana-check-repo

    - name: List files
      run: ls -la

    - name: Compile project
      run: CC=epiclang make
      timeout-minutes: 2

    - name: Clean project
      run: make clean

    - name: Check executable
      run: if [ ! -x "EXECUTABLES" ]; then
        exit 1
      fi